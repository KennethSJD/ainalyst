#
# Sources for upcoming ASX IPOs:
#   - ASX announcements:  https://www.asx.com.au/listings/upcoming-floats
#   - SmallCaps:          https://smallcaps.com.au/upcoming-ipos/
#   - Market Index:       https://www.marketindex.com.au/upcoming-ipos
#
# To add an entry, copy the template below and fill in known fields.
# Fields with ~ (null) are optional and will be skipped gracefully.
