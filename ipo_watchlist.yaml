#   company_name: "Example Corp"
#   sector: "Information Technology"
#   expected_date: "2026-07-01"   # best estimate
#   ipo_price: ~                  # stated offer price (null if unknown)
#   status: upcoming              # upcoming | rumoured | listed | withdrawn
#   notes: "Raising $50M at $2.00/share. Lead manager: Macquarie."
# ──────────────────

